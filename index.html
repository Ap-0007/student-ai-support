<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mental Health Assistant</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 400px; height: 600px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .header { background: #2563eb; color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 1.2em; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 15px; line-height: 1.4; font-size: 0.95em; }
        .user-msg { background: #2563eb; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .bot-msg { background: #e5e7eb; color: #1f2937; align-self: flex-start; border-bottom-left-radius: 4px; }
        .bot-strategy { font-size: 0.85em; background: #dbeafe; color: #1e40af; padding: 8px 12px; border-radius: 8px; margin-top: 5px; border-left: 4px solid #3b82f6; }
        .emergency { background: #fee2e2; color: #991b1b; border-left: 4px solid #dc2626; font-weight: bold; }
        .input-area { padding: 15px; background: white; border-top: 1px solid #e5e7eb; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; outline: none; }
        button { padding: 12px 20px; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #1d4ed8; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">Support Space</div>
    <div class="chat-box" id="chat-box">
        <div class="message bot-msg">Hi there. I'm here to listen and help. What's on your mind today?</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const inputField = document.getElementById("user-input");
        const message = inputField.value.trim();
        if (!message) return;

        // 1. Display User Message
        appendMessage(message, "user-msg");
        inputField.value = "";

        // 2. Send to FastAPI Backend
        try {
            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ user_message: message })
            });
            const data = await response.json();

            // 3. Display Bot Reply
            let botClasses = "message bot-msg";
            if (data.is_escalated) botClasses += " emergency"; // Make it red if it's an emergency
            
            appendMessage(data.reply, botClasses);

            // 4. Display Coping Strategy (if it exists)
            if (data.coping_strategy && !data.is_escalated) {
                const strategyHtml = `<div class="bot-strategy"><b>Suggested Strategy:</b> ${data.coping_strategy}</div>`;
                const chatBox = document.getElementById("chat-box");
                chatBox.insertAdjacentHTML('beforeend', strategyHtml);
                chatBox.scrollTop = chatBox.scrollHeight;
            }

        } catch (error) {
            appendMessage("Sorry, the server is offline.", "message bot-msg emergency");
        }
    }

    function appendMessage(text, className) {
        const chatBox = document.getElementById("chat-box");
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${className}`;
        msgDiv.textContent = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") sendMessage();
    }
</script>

</body>
</html>
